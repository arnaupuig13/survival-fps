<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Survival FPS v1</title>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; color: #ddd; font-family: system-ui, sans-serif; }
    canvas { display: block; }

    /* Crosshair */
    #crosshair { position: fixed; top: 50%; left: 50%; width: 14px; height: 14px; transform: translate(-50%, -50%); pointer-events: none; }
    #crosshair::before, #crosshair::after { content: ''; position: absolute; background: rgba(255,255,255,0.85); }
    #crosshair::before { left: 6px; top: 0;  width: 2px; height: 14px; }
    #crosshair::after  { left: 0;  top: 6px; width: 14px; height: 2px; }

    /* Hit marker — colored by hit / kill via class. */
    #hitMarker { position: fixed; top: 50%; left: 50%; width: 28px; height: 28px; transform: translate(-50%, -50%) rotate(45deg); pointer-events: none; opacity: 0; transition: opacity 0.35s; }
    #hitMarker::before, #hitMarker::after { content: ''; position: absolute; background: #ddd; transition: background 0.05s; }
    #hitMarker::before { left: 13px; top: 0; width: 2px; height: 28px; }
    #hitMarker::after  { left: 0; top: 13px; width: 28px; height: 2px; }
    #hitMarker.kill::before, #hitMarker.kill::after { background: #ff4040; box-shadow: 0 0 6px rgba(255,40,40,0.8); }
    #hitMarker.kill { width: 38px; height: 38px; }
    #hitMarker.kill::before { left: 18px; height: 38px; }
    #hitMarker.kill::after  { top: 18px; width: 38px; }

    /* HP + stamina + ammo + kills */
    #hud { position: fixed; left: 16px; bottom: 16px; min-width: 280px; }
    #hpLabel { font-size: 11px; letter-spacing: 2px; color: #aaa; margin-bottom: 4px; }
    #hpBar { width: 100%; height: 16px; background: rgba(0,0,0,0.55); border: 1px solid #333; }
    #hpFill { height: 100%; background: linear-gradient(90deg, #c93f3f, #f08a8a); transition: width 0.18s; }
    #staminaBar { width: 100%; height: 8px; background: rgba(0,0,0,0.55); border: 1px solid #333; margin-top: 3px; }
    #staminaFill { height: 100%; background: linear-gradient(90deg, #4a8030, #80c060); transition: width 0.12s; }
    /* Mini-map */
    #minimap { position: fixed; right: 12px; top: 86px; background: rgba(0,0,0,0.55); border: 1px solid #444; border-radius: 50%; }
    #ammoRow { display: flex; gap: 14px; margin-top: 8px; font-family: monospace; font-size: 13px; color: #ddd; }
    .ammoCell { background: rgba(0,0,0,0.55); padding: 4px 10px; }
    .ammoLabel { color: #888; font-size: 10px; letter-spacing: 1.5px; margin-right: 6px; }
    #killRow { margin-top: 6px; font-family: monospace; font-size: 12px; background: rgba(0,0,0,0.5); padding: 3px 10px; display: inline-block; }
    #killRow span#killCount { color: #f0c060; font-weight: 700; }

    /* Interact prompt — bottom-center "E abrir cofre" */
    #interactPrompt { position: fixed; bottom: 22%; left: 50%; transform: translateX(-50%); display: none; background: rgba(0,0,0,0.7); padding: 8px 18px; font-size: 14px; letter-spacing: 1px; color: #f0c060; pointer-events: none; }
    #interactPrompt.show { display: inline-block; }
    #interactPrompt kbd { background: #f0c060; color: #1a1a1a; padding: 2px 8px; border-radius: 3px; margin-right: 8px; font-weight: 700; font-size: 12px; }

    /* FPS */
    #fps { position: fixed; right: 12px; top: 10px; font-size: 12px; color: #8f8; background: rgba(0,0,0,0.45); padding: 4px 8px; font-family: monospace; }

    /* Event log */
    #log { position: fixed; left: 16px; top: 16px; max-width: 340px; font-size: 13px; line-height: 1.5; color: #ddd; }
    #log .line { background: rgba(0,0,0,0.55); padding: 3px 8px; margin-bottom: 2px; opacity: 0.95; }

    /* Damage flash */
    #dmgFlash { position: fixed; inset: 0; background: rgba(180,0,0,0); pointer-events: none; transition: background 0.25s; }

    /* Menu */
    #menu { position: fixed; inset: 0; background: rgba(0,0,0,0.78); display: flex; align-items: center; justify-content: center; z-index: 10; }
    #menu .panel { background: rgba(20,20,20,0.92); border: 1px solid #444; padding: 36px 44px; text-align: center; min-width: 320px; }
    #menu h1 { margin: 0 0 6px 0; font-size: 28px; letter-spacing: 5px; color: #f0c060; }
    #menu p.sub { margin: 0 0 22px 0; font-size: 13px; color: #888; letter-spacing: 1px; }
    #menu button { background: #f0c060; color: #1a1a1a; border: none; padding: 12px 32px; font-size: 16px; font-weight: 600; letter-spacing: 2px; cursor: pointer; }
    #menu button:hover { background: #ffd070; }
    #menu .controls { margin-top: 22px; font-size: 12px; color: #888; line-height: 1.7; }
    kbd { background: #333; color: #fff; padding: 1px 5px; border-radius: 2px; font-size: 11px; }

    /* Death screen */
    #death { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 9; }
    #death.show { display: flex; }
    #death .panel { background: rgba(20,0,0,0.92); border: 1px solid #722; padding: 40px 60px; text-align: center; }
    #death h1 { margin: 0 0 18px 0; font-size: 36px; color: #ff5050; letter-spacing: 6px; }
    #death button { background: #c93f3f; color: #fff; border: none; padding: 12px 28px; font-size: 15px; font-weight: 600; letter-spacing: 2px; cursor: pointer; }

    /* Online counter */
    #online { position: fixed; right: 12px; top: 36px; font-size: 12px; color: #8f8; background: rgba(0,20,0,0.45); padding: 3px 8px; font-family: monospace; }
    /* Clock — top-right under online counter */
    #clock { position: fixed; right: 12px; top: 60px; font-size: 14px; color: #f0c060; background: rgba(0,0,0,0.45); padding: 3px 10px; font-family: monospace; letter-spacing: 1px; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
    }
  }
  </script>
</head>
<body>
  <div id="crosshair"></div>
  <div id="hitMarker"></div>
  <div id="dmgFlash"></div>

  <div id="hud">
    <div id="hpLabel">VIDA</div>
    <div id="hpBar"><div id="hpFill" style="width:100%"></div></div>
    <div id="staminaBar"><div id="staminaFill" style="width:100%"></div></div>
    <div id="ammoRow">
      <span class="ammoCell"><span class="ammoLabel">PISTOLA</span><span id="ammoP">0</span></span>
      <span class="ammoCell"><span class="ammoLabel">RIFLE</span><span id="ammoR">0</span></span>
      <span class="ammoCell"><span class="ammoLabel">VENDAS</span><span id="invBandage">0</span></span>
    </div>
    <div id="killRow"><span class="ammoLabel">BAJAS</span> <span id="killCount">0</span></div>
  </div>

  <!-- Mini-map: top-right canvas. Player at center, north up, 100m range. -->
  <canvas id="minimap" width="180" height="180"></canvas>

  <div id="fps">-- FPS</div>
  <div id="online">0 jugadores</div>
  <div id="clock">--:--</div>
  <div id="log"></div>

  <!-- Directional damage indicator: a triangle pointing toward the source -->
  <svg id="dmgArrow" width="160" height="160" viewBox="-80 -80 160 160" style="position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;opacity:0;transition:opacity 0.3s;">
    <polygon points="0,-72 -10,-58 10,-58" fill="rgba(255,40,40,0.9)" stroke="rgba(255,180,180,0.8)" stroke-width="1.5" />
  </svg>

  <div id="interactPrompt"><kbd>E</kbd> <span id="interactText">abrir cofre</span></div>

  <div id="menu">
    <div class="panel">
      <h1>SURVIVAL FPS</h1>
      <p class="sub">Multiplayer · v1</p>
      <button id="playBtn">JUGAR</button>
      <div class="controls">
        <div><kbd>WASD</kbd> moverte · <kbd>SHIFT</kbd> correr</div>
        <div><kbd>SPACE</kbd> saltar · <kbd>CLIC IZQ</kbd> disparar</div>
        <div><kbd>1</kbd> pistola · <kbd>2</kbd> rifle · <kbd>ESC</kbd> menu</div>
      </div>
    </div>
  </div>

  <div id="death">
    <div class="panel">
      <h1>HAS MUERTO</h1>
      <button id="respawnBtn">REAPARECER</button>
    </div>
  </div>

  <script type="module" src="./client/main.js"></script>
</body>
</html>
